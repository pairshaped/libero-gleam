name = "wire_e2e"
version = "0.1.0"
target = "erlang"

[dependencies]
gleam_stdlib = ">= 0.69.0 and < 1.0.0"
gleam_erlang = "~> 1.0"
gleam_http = "~> 4.0"
mist = "~> 6.0"
lustre = "~> 5.6"
shared = { path = "../shared" }
libero = { path = "../../../.." }

[tools.libero]
port = 8080
server.generated_dir = "src/server/generated"
shared.src_dir = "../shared/src/shared"
context_module = "server/handler_context"

[tools.libero.clients.web]
target = "javascript"
