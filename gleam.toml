name = "libero"
version = "5.1.0"
description = "Typed Gleam RPC for Lustre SPAs without REST, JSON codecs, or hand-written dispatch tables"
licences = ["MIT"]
repository = { type = "github", user = "pairshaped", repo = "libero" }

# No target specified - cross-target package.
# Erlang-only modules: libero/trace, libero (the generator main),
#   libero/push, libero/format
# JS-only modules: libero/rpc
# Cross-target modules: libero/error, libero/wire, libero/ssr,
#   libero/field_type, libero/remote_data, libero/ws_logger, libero/gen_error
#
# Per-target @external specs keep each module usable only on its intended
# target. The package as a whole can be depended on from both Erlang and
# JavaScript consumer packages.

[dependencies]
# Lower bound is intentionally wide to maximize compatibility with
# consumer projects. CI tests against the resolved version (0.71.x).
gleam_stdlib = ">= 0.69.0 and < 2.0.0"
glance = "~> 6.0"
simplifile = "~> 2.0"
lustre = "~> 5.6"
tom = ">= 2.0.2 and < 3.0.0"
gleam_http = "~> 4.0"
mist = "~> 6.0"
glexer = ">= 2.4.0 and < 3.0.0"

[dev-dependencies]
glinter = "~> 2.16"
gleeunit = "~> 1.0"
gleam_erlang = "~> 1.0"
birdie = ">= 1.5.5 and < 2.0.0"

[documentation]
pages = [
  { title = "Getting Started", path = "guides/getting-started-step-1.html", source = "./docs/getting_started/step_1.md" },
  { title = "Getting Started, Step 2: SQLite", path = "guides/getting-started-step-2.html", source = "./docs/getting_started/step_2.md" },
]

[tools.glinter]
stats = true
warnings_as_errors = true
include = ["src/"]

[tools.glinter.rules]
# Libero's public API is consumed from GENERATED code in consumer
# packages (dispatch modules and per-module client stubs under each
# consumer's src/*/generated/libero/ tree). The linter can't see those
# call sites from inside lib/libero, so it would flag every public
# type and function as unused. Turn off the check globally for the
# library.
unused_exports = "off"
