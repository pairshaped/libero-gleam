name = "libero"
version = "6.0.0"
description = "RPC plumbing library: handler scanning, dispatch codegen, ETF wire protocol, and decoder generation for Gleam"
licences = ["MIT"]
repository = { type = "github", user = "pairshaped", repo = "libero" }

# No target specified - cross-target package.
# Erlang-only modules: libero/trace, libero/format
# JS-only modules: (none currently)
# Cross-target modules: libero/error, libero/wire,
#   libero/field_type, libero/remote_data, libero/gen_error

[dependencies]
gleam_stdlib = ">= 0.69.0 and < 2.0.0"
glance = "~> 6.0"
simplifile = "~> 2.0"
glexer = ">= 2.4.0 and < 3.0.0"
gleam_crypto = ">= 1.6.0 and < 2.0.0"

[dev-dependencies]
glinter = "~> 2.17"
gleeunit = "~> 1.0"
gleam_erlang = "~> 1.0"
birdie = ">= 2.0.0 and < 3.0.0"

[tools.glinter]
stats = true
warnings_as_errors = true
include = ["src/"]

[tools.glinter.rules]
# Libero's public API is consumed from GENERATED code in consumer
# packages (dispatch modules and per-module client stubs under each
# consumer's src/*/generated/libero/ tree). The linter can't see those
# call sites from inside lib/libero, so it would flag every public
# type and function as unused. Turn off the check globally for the
# library.
unused_exports = "off"
